apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-api
  template:
    metadata:
      labels:
        app: customer-api
    spec:
      containers:
      - name: customer-api
        image: hashicorp/http-echo
        args:
          - "-text={\"customers\":[{\"id\":1,\"name\":\"Acme Corp\",\"industry\":\"Manufacturing\",\"tier\":\"Enterprise\"},{\"id\":2,\"name\":\"TechStart\",\"industry\":\"Technology\",\"tier\":\"SMB\"}],\"total\":2}"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: customer-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: customer-api
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30081
