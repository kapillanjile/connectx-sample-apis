apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      containers:
      - name: sample-api
        image: hashicorp/http-echo
        args:
          - "-text={\"status\":\"healthy\",\"service\":\"connectx-sample-api\",\"version\":\"1.0.0\",\"message\":\"Hello from ConnectX OSS API Platform\"}"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: sample-api
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
