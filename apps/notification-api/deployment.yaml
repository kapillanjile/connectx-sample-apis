apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
      - name: notification-api
        image: hashicorp/http-echo
        args:
          - "-text={\"notifications\":[{\"id\":1,\"type\":\"email\",\"recipient\":\"admin@acme.com\",\"subject\":\"API Key Expiry Warning\",\"status\":\"sent\"},{\"id\":2,\"type\":\"webhook\",\"recipient\":\"https://hooks.acme.com/alerts\",\"subject\":\"Rate Limit Exceeded\",\"status\":\"delivered\"}],\"total\":2}"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: notification-api
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30083
