apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
      - name: order-api
        image: hashicorp/http-echo
        args:
          - "-text={\"orders\":[{\"id\":\"ORD-001\",\"customer\":\"Acme Corp\",\"product\":\"API Gateway License\",\"status\":\"fulfilled\",\"amount\":15000},{\"id\":\"ORD-002\",\"customer\":\"TechStart\",\"product\":\"Developer Portal\",\"status\":\"pending\",\"amount\":8500}],\"total\":2}"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: order-api
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30082
