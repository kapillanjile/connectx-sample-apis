apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: connectx-platform
  title: ConnectX API Platform
  description: Enterprise API Management Platform - OSS alternative to MuleSoft Anypoint
spec:
  owner: connectx
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: connectx-sample-api
  title: Health Check API
  description: Platform health and status API
  tags:
    - rest
    - health
  links:
    - url: https://gravitee.au.connectxconsultingptyltd.cftenant.com
      title: Gravitee Manager
    - url: https://argocd.au.connectxconsultingptyltd.cftenant.com
      title: ArgoCD
spec:
  type: service
  lifecycle: production
  owner: connectx
  system: connectx-platform
  providesApis:
    - sample-api-definition
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-api
  title: Customer API
  description: CRM customer data service providing customer profiles, tiers, and industry classification
  tags:
    - rest
    - crm
    - customers
  links:
    - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com/customer-api
      title: Gateway Endpoint
spec:
  type: service
  lifecycle: production
  owner: connectx
  system: connectx-platform
  providesApis:
    - customer-api-definition
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-api
  title: Order Management API
  description: Order processing and fulfillment tracking service
  tags:
    - rest
    - orders
    - commerce
  links:
    - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com/order-api
      title: Gateway Endpoint
spec:
  type: service
  lifecycle: production
  owner: connectx
  system: connectx-platform
  providesApis:
    - order-api-definition
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: notification-api
  title: Notification API
  description: Multi-channel notification service supporting email, webhook, and SMS delivery
  tags:
    - rest
    - notifications
    - messaging
  links:
    - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com/notification-api
      title: Gateway Endpoint
spec:
  type: service
  lifecycle: production
  owner: connectx
  system: connectx-platform
  providesApis:
    - notification-api-definition
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: sample-api-definition
  title: Health Check API
  description: Platform health endpoint
spec:
  type: openapi
  lifecycle: production
  owner: connectx
  system: connectx-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Health Check API
      version: 1.0.0
    servers:
      - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com
    paths:
      /sample-api:
        get:
          summary: Get platform health
          security:
            - apiKey: []
          responses:
            '200':
              description: OK
            '401':
              description: Unauthorized
            '429':
              description: Rate limited
    components:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: X-Gravitee-Api-Key
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: customer-api-definition
  title: Customer API
  description: Customer data service
spec:
  type: openapi
  lifecycle: production
  owner: connectx
  system: connectx-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Customer API
      version: 1.0.0
    servers:
      - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com
    paths:
      /customer-api:
        get:
          summary: List customers
          security:
            - apiKey: []
          responses:
            '200':
              description: OK
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      customers:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            industry:
                              type: string
                            tier:
                              type: string
                      total:
                        type: integer
    components:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: X-Gravitee-Api-Key
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: order-api-definition
  title: Order Management API
  description: Order processing service
spec:
  type: openapi
  lifecycle: production
  owner: connectx
  system: connectx-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Order Management API
      version: 1.0.0
    servers:
      - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com
    paths:
      /order-api:
        get:
          summary: List orders
          security:
            - apiKey: []
          responses:
            '200':
              description: OK
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      orders:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            customer:
                              type: string
                            product:
                              type: string
                            status:
                              type: string
                            amount:
                              type: number
                      total:
                        type: integer
    components:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: X-Gravitee-Api-Key
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: notification-api-definition
  title: Notification API
  description: Multi-channel notification service
spec:
  type: openapi
  lifecycle: production
  owner: connectx
  system: connectx-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Notification API
      version: 1.0.0
    servers:
      - url: https://gravitee-gw.au.connectxconsultingptyltd.cftenant.com
    paths:
      /notification-api:
        get:
          summary: List notifications
          security:
            - apiKey: []
          responses:
            '200':
              description: OK
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      notifications:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            type:
                              type: string
                            recipient:
                              type: string
                            subject:
                              type: string
                            status:
                              type: string
                      total:
                        type: integer
    components:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: X-Gravitee-Api-Key
